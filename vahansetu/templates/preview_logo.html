<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VahanSetu Logo Preview</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Outfit:wght@800&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        body {
            background: #050a14;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
            font-family: 'Outfit', sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 50px;
            align-items: center;
        }

        /* --- THE LOGO CODE --- */
        .vs-logo-wrap {
            --cyan: #00f2ff;
            --purple: #7000ff;
            --green: #00ff95;
            --bg-dark: #0a0f1d;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(0, 242, 255, 0.1);
            
            display: inline-flex;
            align-items: center;
            gap: 16px;
            text-decoration: none;
            position: relative;
            cursor: pointer;
            perspective: 1000px;
        }

        /* THE BRAND MARK BOX */
        .vs-mark-container {
            position: relative;
            width: 54px;
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-style: preserve-3d;
        }

        .vs-mark-glass {
            position: absolute;
            inset: 0;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 14px;
            box-shadow: 
                0 10px 30px rgba(0, 0, 0, 0.5),
                inset 0 0 15px rgba(0, 242, 255, 0.05);
            overflow: hidden;
            z-index: 1;
        }

        /* Animated Lens Flare inside the box */
        .vs-mark-glass::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(
                from 0deg,
                transparent,
                rgba(0, 242, 255, 0.05),
                transparent 20%,
                transparent 50%,
                rgba(112, 0, 255, 0.05),
                transparent 70%,
                transparent
            );
            animation: vs-rotate 10s linear infinite;
        }

        /* ENERGY CORE PULSE */
        .vs-energy-core {
            position: absolute;
            width: 120%;
            height: 120%;
            background: radial-gradient(circle, var(--cyan) 0%, transparent 70%);
            opacity: 0.1;
            filter: blur(20px);
            animation: vs-pulse 3s ease-in-out infinite;
            z-index: 0;
        }

        /* THE VS SVG MARK */
        .vs-svg-mark {
            position: relative;
            z-index: 2;
            width: 32px;
            height: 28px;
            transform: translateZ(20px);
        }

        .vs-path {
            fill: none;
            stroke-width: 3.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 0 8px var(--cyan-glow));
        }

        .vs-path-v {
            stroke: url(#v-grad);
            --cyan-glow: rgba(0, 242, 255, 0.6);
        }

        .vs-path-s {
            stroke: url(#s-grad);
            --cyan-glow: rgba(112, 0, 255, 0.6);
        }

        /* ENERGY FLOW ANIMATION */
        .vs-energy-flow {
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            animation: vs-flow 3s linear infinite;
            stroke: #fff;
            stroke-width: 1.5;
            opacity: 0.8;
            filter: blur(1px);
        }

        /* WORDMARK */
        .vs-wordmark {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .vs-wordmark-main {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 1.4rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #fff;
            line-height: 0.9;
        }

        .vs-wordmark-accent {
            color: var(--cyan);
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        .vs-wordmark-sub {
            font-size: 0.55rem;
            letter-spacing: 0.6em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 4px;
            font-weight: 700;
        }

        /* HOVER INTERACTIONS */
        .vs-logo-wrap:hover .vs-mark-container {
            transform: rotateY(15deg) rotateX(10deg) scale(1.1);
        }

        .vs-logo-wrap:hover .vs-mark-glass {
            border-color: rgba(0, 242, 255, 0.4);
            box-shadow: 
                0 15px 40px rgba(0, 0, 0, 0.6),
                0 0 30px rgba(0, 242, 255, 0.2),
                inset 0 0 20px rgba(0, 242, 255, 0.1);
        }

        .vs-logo-wrap:hover .vs-energy-core {
            opacity: 0.3;
            animation-duration: 1s;
        }

        .vs-logo-wrap:hover .vs-wordmark-main {
            letter-spacing: 0.2em;
            transition: letter-spacing 0.4s ease;
        }

        /* ANIMATIONS */
        @keyframes vs-rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes vs-pulse {
            0%, 100% { transform: scale(1); opacity: 0.1; }
            50% { transform: scale(1.2); opacity: 0.25; }
        }

        @keyframes vs-flow {
            0% { stroke-dashoffset: 100; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { stroke-dashoffset: -100; opacity: 0; }
        }

        /* HERO VARIANT */
        .hero-wrap .vs-mark-container {
            width: 80px;
            height: 80px;
        }
        .hero-wrap .vs-svg-mark {
            width: 48px;
            height: 42px;
        }
        .hero-wrap .vs-wordmark-main {
            font-size: 2.2rem;
        }
        .hero-wrap .vs-wordmark-sub {
            font-size: 0.8rem;
        }

    </style>
</head>
<body>

    <div class="container">
        <!-- NORMAL LOGO -->
        <a href="#" class="vs-logo-wrap">
            <div class="vs-energy-core"></div>
            <div class="vs-mark-container">
                <div class="vs-mark-glass"></div>
                <svg class="vs-svg-mark" viewBox="0 0 80 70">
                    <defs>
                        <linearGradient id="v-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#00f2ff" />
                            <stop offset="100%" stop-color="#0066ff" />
                        </linearGradient>
                        <linearGradient id="s-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#7000ff" />
                            <stop offset="100%" stop-color="#ff00d4" />
                        </linearGradient>
                    </defs>
                    
                    <!-- THE V -->
                    <path class="vs-path vs-path-v" d="M10,15 L35,55 L60,15" />
                    <!-- THE S (Angular & Flowing) -->
                    <path class="vs-path vs-path-s" d="M30,25 L55,25 C65,25 65,35 65,40 C65,45 60,55 50,55 L25,55" />
                    
                    <!-- ENERGY FLOW OVERLAY -->
                    <path class="vs-energy-flow vs-path-v" d="M10,15 L35,55 L60,15" />
                    <path class="vs-energy-flow vs-path-s" d="M30,25 L55,25 C65,25 65,35 65,40 C65,45 60,55 50,55 L25,55" style="animation-delay: 1.5s;" />
                </svg>
            </div>
            <div class="vs-wordmark">
                <div class="vs-wordmark-main">VAHAN<span class="vs-wordmark-accent">SETU</span></div>
                <div class="vs-wordmark-sub">Evolution of Mobility</div>
            </div>
        </a>

        <!-- HERO LOGO -->
        <div class="hero-wrap">
            <a href="#" class="vs-logo-wrap">
                <div class="vs-energy-core"></div>
                <div class="vs-mark-container">
                    <div class="vs-mark-glass"></div>
                    <svg class="vs-svg-mark" viewBox="0 0 80 70">
                        <path class="vs-path vs-path-v" d="M10,15 L35,55 L60,15" />
                        <path class="vs-path vs-path-s" d="M30,25 L55,25 C65,25 65,35 65,40 C65,45 60,55 50,55 L25,55" />
                        <path class="vs-energy-flow vs-path-v" d="M10,15 L35,55 L60,15" />
                        <path class="vs-energy-flow vs-path-s" d="M30,25 L55,25 C65,25 65,35 65,40 C65,45 60,55 50,55 L25,55" style="animation-delay: 1.5s;" />
                    </svg>
                </div>
                <div class="vs-wordmark">
                    <div class="vs-wordmark-main">VAHAN<span class="vs-wordmark-accent">SETU</span></div>
                    <div class="vs-wordmark-sub">Evolution of Mobility</div>
                </div>
            </a>
        </div>
    </div>

</body>
</html>
